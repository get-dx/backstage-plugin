name: Publish Package

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  npm-publish:
    name: publish-npm
    runs-on: ubuntu-latest
    environment: Publish
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Typecheck
        run: yarn tsc

      - name: Build package
        run: yarn build

      - name: Publish to npm
        run: npm publish
